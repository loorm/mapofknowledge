<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learner Passport — Map of Knowledge</title>
<link rel="stylesheet" href="css/palette.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/font-scale.css">
<script>fetch('/api/settings').then(function(r){return r.json();}).then(function(s){var f=s.font_size;if(f==='medium')document.documentElement.classList.add('fs-medium');if(f==='large')document.documentElement.classList.add('fs-large');var p=s.palette==='midnight'?'vampire':s.palette;if(p&&p!=='sunset')document.documentElement.classList.add('palette-'+p);if(s.ui_locale&&s.ui_locale!=='en'){window._uiLocale=s.ui_locale;window.reloadStrings&&window.reloadStrings();}}).catch(function(){});</script>
<script src="js/strings.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════
     TOP BAR
     ════════════════════════════════════════ -->
<header id="top-bar">

  <a class="topbar-logo" href="index.html" onclick="if(window.parent!==window&&typeof window.parent.closeOverlay==='function'){window.parent.closeOverlay();return false;}">
    <div class="topbar-logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="white" stroke-width="1.3"/>
        <circle cx="8" cy="8" r="1.4" fill="white"/>
        <line x1="8" y1="2.5" x2="8" y2="4.6" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="8" y1="11.4" x2="8" y2="13.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="2.5" y1="8" x2="4.6" y2="8" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="11.4" y1="8" x2="13.5" y2="8" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="topbar-logo-text">Map of Knowledge</span>
  </a>

  <div class="topbar-banner">
    <div class="topbar-banner-inner">
      <span class="topbar-banner-dot"></span>
      Learner Passport — Loading…
    </div>
  </div>

  <div class="topbar-right">
    <div class="topbar-burger-wrap">
      <button class="topbar-icon-btn topbar-burger" id="nav-menu" title="Menu">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <path d="M1 1h14M1 7h14M1 13h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="topbar-notif-dot"></span>
      </button>
      <div id="nav-dropdown" class="nav-dropdown">
        <button class="nav-dropdown-item active-page">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 13c0-2.8 2.5-4.5 5.5-4.5s5.5 1.7 5.5 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span data-i18n="nav.account">Account</span>
        </button>
        <button class="nav-dropdown-item" onclick="window.location='notifications.html'">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1.5a4 4 0 0 0-4 4v2.5L2.5 9.5h10l-1-1.5V5.5a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            <path d="M6 11.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span data-i18n="nav.notifications">Notifications</span>
          <span id="nav-notif-badge"></span>
        </button>
        <div class="nav-dropdown-divider"></div>
        <button class="nav-dropdown-item" onclick="window.location='settings.html'">
          <img src="images/icon-settings.svg" width="15" height="15" alt="">
          <span data-i18n="nav.settings">Settings</span>
        </button>
        <div class="nav-dropdown-divider"></div>
        <button class="nav-dropdown-item" onclick="window.top.location='/auth/logout'">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M5.5 7.5h7M10 5l2.5 2.5L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 3H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span data-i18n="nav.log_out">Log out</span>
        </button>
      </div>
    </div>
  </div>

</header>
<script>
  document.getElementById('nav-menu').addEventListener('click', e => { e.stopPropagation(); document.getElementById('nav-dropdown').classList.toggle('open'); document.getElementById('nav-menu').classList.toggle('active'); });
  document.addEventListener('click', () => { document.getElementById('nav-dropdown').classList.remove('open'); document.getElementById('nav-menu').classList.remove('active'); });

  (function () {
    var nav      = document.getElementById('profile-nav');
    var backdrop = document.getElementById('pnav-backdrop');
    var toggle   = document.getElementById('pnav-toggle');
    function openNav()  { nav.classList.add('open'); backdrop.classList.add('open'); }
    function closeNav() { nav.classList.remove('open'); backdrop.classList.remove('open'); }
    if (toggle) {
      toggle.addEventListener('click', function (e) { e.stopPropagation(); openNav(); });
      toggle.addEventListener('touchstart', function (e) { e.stopPropagation(); e.preventDefault(); openNav(); }, { passive: false });
    }
    if (backdrop) {
      backdrop.addEventListener('click', closeNav);
      backdrop.addEventListener('touchstart', function (e) { e.preventDefault(); closeNav(); }, { passive: false });
    }
    if (nav) nav.querySelectorAll('.pnav-link').forEach(function (a) {
      a.addEventListener('click', closeNav);
    });
  })();
</script>


<div id="pnav-backdrop"></div>

<!-- ════════════════════════════════════════
     LEFT NAV
     ════════════════════════════════════════ -->
<nav id="profile-nav">

  <div class="pnav-avatar-wrap">
    <div class="pnav-avatar-circle"></div>
    <div class="pnav-name"></div>
    <div class="pnav-tagline"></div>
  </div>

  <div class="pnav-divider"></div>

  <div class="pnav-links">
    <a class="pnav-link s1" href="#s1"><span class="pnav-num">1</span><span data-i18n="section.s1_title">Learner Profile</span></a>
    <a class="pnav-link s2" href="#s2"><span class="pnav-num">2</span><span data-i18n="section.s2_title">Learning Events</span></a>
    <a class="pnav-link s3" href="#s3"><span class="pnav-num">3</span><span data-i18n="section.s3_title">Relationships</span></a>
    <a class="pnav-link s4" href="#s4"><span class="pnav-num">4</span><span data-i18n="section.s4_title">Credentials</span></a>
    <a class="pnav-link s5" href="#s5"><span class="pnav-num">5</span><span data-i18n="section.s5_title">Competence State</span></a>
    <a class="pnav-link s6" href="#s6"><span class="pnav-num">6</span><span data-i18n="section.s6_title">Goals</span></a>
  </div>

</nav>


<!-- ════════════════════════════════════════
     MAIN CONTENT
     ════════════════════════════════════════ -->
<main id="profile-main">
  <button id="pnav-toggle" aria-label="Open sections menu">
    <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
      <path d="M1 1h12M1 6h12M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span data-i18n="btn.sections">Sections</span>
  </button>


  <!-- ══════════════════════════════════════
       1 — LEARNER PROFILE
       ══════════════════════════════════════ -->
  <section class="p-section" id="s1">
    <div class="p-section-header">
      <div class="p-section-badge s1">1</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s1_title">Learner Profile</div>
      </div>
    </div>

    <div class="p-section-body two-col">

      <!-- Identity -->
      <div class="p-card s1" id="identity-card"></div>

      <!-- Learning needs and preferences -->
      <div class="p-card s1" id="about-card"></div>

      <!-- Interests & values -->
      <div class="p-card s1" id="interests-card"></div>


    </div>
  </section>


  <!-- ══════════════════════════════════════
       2 — LEARNING EVENTS
       ══════════════════════════════════════ -->
  <section class="p-section" id="s2">
    <div class="p-section-header">
      <div class="p-section-badge s2">2</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s2_title">Learning Events</div>
      </div>
    </div>

    <div class="p-section-body">

      <!-- Events ledger -->
      <div class="p-card s2" id="events-ledger"></div>

      <!-- Reflections -->
      <div class="p-card s2" id="reflections-card"></div>

    </div>
  </section>


  <!-- ══════════════════════════════════════
       3 — LEARNING RELATIONSHIPS
       ══════════════════════════════════════ -->
  <section class="p-section" id="s3">
    <div class="p-section-header">
      <div class="p-section-badge s3">3</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s3_title">Learning Relationships</div>
      </div>
    </div>

    <div class="p-section-body two-col">

      <!-- Individuals -->
      <div class="p-card s3" id="individuals-card"></div>

      <!-- Groups -->
      <div class="p-card s3" id="groups-card"></div>

      <!-- Learning providers — merged, full width -->
      <div class="p-card s3 span2" id="providers-card"></div>

    </div>
  </section>


  <!-- ══════════════════════════════════════
       4 — CREDENTIALS
       ══════════════════════════════════════ -->
  <section class="p-section" id="s4">
    <div class="p-section-header">
      <div class="p-section-badge s4">4</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s4_title">Credentials</div>
      </div>
    </div>

    <div class="p-section-body two-col">

      <!-- Map of Knowledge — internal credentials -->
      <div class="p-card s4 span2" id="platform-credentials-card"></div>

      <div class="p-card s4" id="qualifications-card"></div>

      <div class="p-card s4" id="awards-card"></div>

      <div class="p-card s4 span2" id="certifications-card"></div>

    </div>
  </section>


  <!-- ══════════════════════════════════════
       5 — COMPETENCE STATE
       ══════════════════════════════════════ -->
  <section class="p-section" id="s5">
    <div class="p-section-header">
      <div class="p-section-badge s5">5</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s5_title">Competence State</div>
      </div>
    </div>

    <div class="p-section-body">

      <!-- Knowledge (domains + languages) -->
      <div class="p-card s5" id="knowledge-card"></div>

      <!-- Skills (technical + learning practice) -->
      <div class="p-card s5" id="skills-card"></div>

    </div>
  </section>


  <!-- ══════════════════════════════════════
       6 — GOALS
       ══════════════════════════════════════ -->
  <section class="p-section" id="s6">
    <div class="p-section-header">
      <div class="p-section-badge s6">6</div>
      <div class="p-section-titles">
        <div class="p-section-title" data-i18n="section.s6_title">Goals</div>
      </div>
    </div>

    <div class="p-section-body">

      <!-- Goals -->
      <div class="p-card s6" id="goals-card"></div>

      <!-- Objectives -->
      <div class="p-card s6" id="objectives-card"></div>

      <!-- Plans -->
      <div class="p-card s6" id="plans-card"></div>

    </div>
  </section>


</main>
<script src="js/topbar-notif.js"></script>
<script src="js/profile.js"></script>
</body>
</html>

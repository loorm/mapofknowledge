<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — Map of Knowledge</title>
<link rel="stylesheet" href="css/palette.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/notifications.css">
<script>fetch('/api/settings').then(function(r){return r.json();}).then(function(s){var p=s.palette==='midnight'?'vampire':s.palette;if(p&&p!=='sunset')document.documentElement.classList.add('palette-'+p);if(s.ui_locale&&s.ui_locale!=='en'){window._uiLocale=s.ui_locale;window.reloadStrings&&window.reloadStrings();}}).catch(function(){});</script>
<script src="js/strings.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════
     TOP BAR (mirrors index.html)
     ════════════════════════════════════════ -->
<header id="top-bar">

  <a class="topbar-logo" href="index.html" onclick="if(window.parent!==window&&typeof window.parent.closeOverlay==='function'){window.parent.closeOverlay();return false;}">
    <div class="topbar-logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="white" stroke-width="1.3"/>
        <circle cx="8" cy="8" r="1.4" fill="white"/>
        <line x1="8" y1="2.5" x2="8" y2="4.6" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="8" y1="11.4" x2="8" y2="13.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="2.5" y1="8" x2="4.6" y2="8" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="11.4" y1="8" x2="13.5" y2="8" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="topbar-logo-text">Map of Knowledge</span>
  </a>

  <div class="topbar-right">
    <div class="topbar-burger-wrap">
      <button class="topbar-icon-btn topbar-burger" id="nav-menu" title="Menu">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <path d="M1 1h14M1 7h14M1 13h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="topbar-notif-dot"></span>
      </button>

      <div id="nav-dropdown" class="nav-dropdown">
        <button class="nav-dropdown-item" onclick="window.location='profile.html'">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 13c0-2.8 2.5-4.5 5.5-4.5s5.5 1.7 5.5 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span data-i18n="nav.account">Account</span>
        </button>
        <button class="nav-dropdown-item active-page">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1.5a4 4 0 0 0-4 4v2.5L2.5 9.5h10l-1-1.5V5.5a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            <path d="M6 11.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span data-i18n="nav.notifications">Notifications</span>
        </button>
        <div class="nav-dropdown-divider"></div>
        <button class="nav-dropdown-item" onclick="window.location='settings.html'">
          <img src="images/icon-settings.svg" width="15" height="15" alt="">
          <span data-i18n="nav.settings">Settings</span>
        </button>
        <div class="nav-dropdown-divider"></div>
        <button class="nav-dropdown-item" onclick="window.top.location='/auth/logout'">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M5.5 7.5h7M10 5l2.5 2.5L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 3H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span data-i18n="nav.log_out">Log out</span>
        </button>
      </div>
    </div>
  </div>

</header>


<!-- ════════════════════════════════════════
     NOTIFICATIONS CONTENT
     ════════════════════════════════════════ -->
<main class="notif-page">

  <div class="notif-header">
    <h1 class="notif-title" data-i18n="nav.notifications">Notifications</h1>
    <button class="notif-mark-all" id="mark-all-btn" data-i18n="btn.mark_all_read">Mark all as read</button>
  </div>

  <div class="notif-tabs">
    <button class="notif-tab active" data-filter="all" data-i18n="tab.all">All</button>
    <button class="notif-tab" data-filter="unread" data-i18n="tab.unread">Unread</button>
    <button class="notif-tab" data-filter="achievements" data-i18n="tab.achievements">Achievements</button>
  </div>

  <div id="notif-list"></div>

</main>

<script src="js/topbar-notif.js"></script>
<script>
  /* ── Burger dropdown ── */
  document.getElementById('nav-menu').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('nav-dropdown').classList.toggle('open');
  });
  document.addEventListener('click', function() {
    document.getElementById('nav-dropdown').classList.remove('open');
  });

  /* ── Icon SVG per notification type ── */
  var ICONS = {
    welcome: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    knobit_complete: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9.5L7 13.5L15 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    unit_complete: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l2 5h5l-4 3 1.5 5L9 12l-4.5 3L6 10 2 7h5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>',
    credential: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l2 5h5l-4 3 1.5 5L9 12l-4.5 3L6 10 2 7h5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>',
    test_result: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3.5" y="2.5" width="11" height="13" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M6 7h6M6 10h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>',
    goal_complete: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    knowledge_marked: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2.5a4.5 4.5 0 0 1 2.8 8V13a.5.5 0 0 1-.5.5H6.7a.5.5 0 0 1-.5-.5v-2.5A4.5 4.5 0 0 1 9 2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M6.5 15.5h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>',
    admin: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M9 6v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="13" r="0.8" fill="currentColor"/></svg>',
    badge: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l2 5h5l-4 3 1.5 5L9 12l-4.5 3L6 10 2 7h5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>',
    streak: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M10 2s-5 4-2 8c1 1.5 2 1 2 1s-1-2 1-3c0 0 3 2 3 4s-1.5 3-4 3c-3 0-6-2-6-5.5C4 5.5 10 2 10 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>',
  };

  var ACHIEVEMENT_TYPES = { unit_complete:1, credential:1, badge:1, streak:1, goal_complete:1 };

  function relTime(ts) {
    var diff = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (diff < 60)         return t('label.just_now');
    if (diff < 3600)       return Math.floor(diff / 60) + ' ' + t('label.min_ago');
    if (diff < 86400)      return Math.floor(diff / 3600) + ' ' + t('label.h_ago');
    if (diff < 86400 * 2)  return t('label.yesterday');
    if (diff < 86400 * 7)  return Math.floor(diff / 86400) + ' ' + t('label.days_ago');
    if (diff < 86400 * 30) return Math.floor(diff / 86400 / 7) + ' ' + t('label.wk_ago');
    return Math.floor(diff / 86400 / 30) + ' ' + t('label.mo_ago');
  }

  var _all = [];
  var _filter = 'all';

  function render() {
    var list = document.getElementById('notif-list');
    var items = _all.filter(function(n) {
      if (_filter === 'unread')       return !n.is_read;
      if (_filter === 'achievements') return !!ACHIEVEMENT_TYPES[n.type];
      return true;
    });

    if (!items.length) {
      list.innerHTML = '<div class="notif-empty"><div class="notif-empty-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2a5 5 0 0 0-5 5v3L3 12h14l-2-2V7a5 5 0 0 0-5-5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 14a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.3"/></svg></div>'
        + (_filter === 'unread' ? t('msg.all_caught_up') : t('msg.nothing_here_yet')) + '</div>';
      return;
    }

    var cutoff = Date.now() - 2 * 86400 * 1000;
    var html = '';
    var shownNew = false, shownEarlier = false;

    items.forEach(function(n) {
      var isNew = new Date(n.created_at).getTime() > cutoff;
      if (isNew && !shownNew) {
        html += '<div class="notif-section-label">' + t('label.new') + '</div>';
        shownNew = true;
      } else if (!isNew && !shownEarlier) {
        html += '<div class="notif-section-label">' + t('label.earlier') + '</div>';
        shownEarlier = true;
      }
      var icon = ICONS[n.type] || ICONS.admin;
      var readClass = n.is_read ? ' read' : '';
      html += '<div class="notif-card' + readClass + '" data-id="' + n.id + '">'
        + (!n.is_read ? '<div class="notif-unread-dot"></div>' : '')
        + '<div class="notif-icon ' + (n.icon_color || 'terra') + '">' + icon + '</div>'
        + '<div class="notif-body">'
        + '<div class="notif-name">' + esc(n.title) + '</div>'
        + (n.body ? '<div class="notif-desc">' + esc(n.body) + '</div>' : '')
        + '<div class="notif-time">' + relTime(n.created_at) + '</div>'
        + '</div>'
        + (!n.is_read ? '<button class="notif-read-btn" data-id="' + n.id + '" title="Mark as read">✓</button>' : '')
        + '</div>';
    });
    list.innerHTML = html;

    list.querySelectorAll('.notif-read-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        markOne(parseInt(btn.dataset.id));
      });
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function markOne(id) {
    fetch('/api/notifications/' + id + '/read', { method: 'POST' }).catch(function(){});
    _all.forEach(function(n) { if (n.id === id) n.is_read = 1; });
    render();
    updateDot();
  }

  function markAllRead() {
    fetch('/api/notifications/read-all', { method: 'POST' }).catch(function(){});
    _all.forEach(function(n) { n.is_read = 1; });
    render();
    updateDot();
  }

  function updateDot() {
    var unread = _all.filter(function(n) { return !n.is_read; }).length;
    var dot = document.getElementById('topbar-notif-dot');
    if (dot) dot.style.display = unread ? 'block' : 'none';
  }

  document.getElementById('mark-all-btn').addEventListener('click', markAllRead);

  document.querySelectorAll('.notif-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.notif-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      _filter = tab.dataset.filter;
      render();
    });
  });

  fetch('/api/notifications')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      _all = Array.isArray(data) ? data : [];
      render();
      updateDot();
    })
    .catch(function() {
      document.getElementById('notif-list').innerHTML =
        '<div class="notif-empty">' + t('msg.could_not_load_notif') + '</div>';
    });
</script>

</body>
</html>

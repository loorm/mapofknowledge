<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Human Knowledge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080810; font-family: system-ui, sans-serif; overflow: hidden; }
#canvas { width: 100vw; height: 100vh; }
#tooltip {
  position: fixed; pointer-events: none;
  background: rgba(10,10,20,0.95); color: #e0e0f0;
  padding: 8px 12px; border-radius: 6px; font-size: 13px;
  border: 0.5px solid rgba(255,255,255,0.2);
  display: none; max-width: 220px; line-height: 1.4;
}
#legend {
  position: fixed; bottom: 20px; left: 20px;
  display: flex; flex-wrap: wrap; gap: 8px; max-width: 440px;
}
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
#info { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-size: 12px; pointer-events: none; white-space: nowrap; }
#search-box {
  position: fixed; top: 14px; right: 20px;
  background: rgba(20,20,35,0.9); border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 6px 10px; color: #e0e0f0; font-size: 12px;
  width: 180px; outline: none;
}
#search-box::placeholder { color: rgba(255,255,255,0.3); }
#zoom-level { position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.2); font-size: 11px; }
</style>
</head>
<body>
<svg id="canvas"></svg>
<div id="tooltip"></div>
<div id="legend"></div>
<div id="info">Scroll to zoom · Drag to pan · Click node to highlight · Search top right</div>
<input id="search-box" type="text" placeholder="Search knowledge..." />
<div id="zoom-level"></div>

<script>
const CONTINENTS = {
  "Mathematics": "#378ADD",
  "Philosophy": "#9F8FE8",
  "Social Sciences": "#EF9F27",
  "Medicine": "#E2614A",
  "Humanities": "#2BBFA0",
  "Arts": "#D4537E",
  "Applied Sciences": "#7ABF3C",
  "Natural Sciences": "#5BC8D8",
  "Skills & Crafts": "#9A9890"
};

// Zoom thresholds: at what zoom scale each label level becomes visible
// Level 1 (continents): visible from 0.1 to 0.8
// Level 2: visible from 0.5 to 2.0
// Level 3: visible from 1.2 to 4.0
// Level 4: visible from 2.5 to 8.0
// Level 5: visible from 4.0 upward
const LABEL_RANGES = {
  1: { min: 0.0, max: 0.9 },
  2: { min: 0.3, max: 2.2 },
  3: { min: 0.6, max: 99  },
  4: { min: 1.2, max: 99  },
  5: { min: 2.0, max: 99  },
};

function labelOpacity(level, zoom) {
  const range = LABEL_RANGES[level];
  if (!range) return 0;
  const { min, max } = range;
  if (zoom < min) return 0;
  if (zoom > max) return 0;
  const fadeWidth = (max - min) * 0.15;
  const fadeIn  = Math.min(1, (zoom - min) / Math.max(fadeWidth, 0.01));
  const fadeOut = max >= 90 ? 1 : Math.min(1, (max - zoom) / Math.max(fadeWidth, 0.01));
  return Math.min(fadeIn, fadeOut);
}

fetch('knowledge_map.json')
  .then(r => r.json())
  .then(data => init(data))
  .catch(() => {
    document.body.innerHTML = '<div style="color:white;padding:20px">Could not load knowledge_map.json — place it in the same folder as this HTML file.</div>';
  });

function init(data) {
  const nodes = data.nodes.map(n => ({...n}));
  const edges = data.edges.map(e => ({...e}));

  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const edgeMap = {};
  edges.forEach(e => { if (!edgeMap[e.target]) edgeMap[e.target] = e.source; });

  function getContinent(id) {
    let cur = id;
    let visited = new Set();
    while (edgeMap[cur] !== undefined && !visited.has(cur)) {
      visited.add(cur);
      cur = edgeMap[cur];
    }
    return nodeMap[cur] ? nodeMap[cur].label : "Unknown";
  }

  nodes.forEach(n => {
    n.continent = getContinent(n.id);
    n.color = CONTINENTS[n.continent] || "#888";
  });

  const w = window.innerWidth, h = window.innerHeight;
  const svg = d3.select("#canvas").attr("width", w).attr("height", h);
  const g = svg.append("g");

  let currentZoom = 1;

  const zoomBehaviour = d3.zoom()
    .scaleExtent([0.1, 15])
    .on("zoom", e => {
      g.attr("transform", e.transform);
      currentZoom = e.transform.k;
      updateLabels();
      document.getElementById("zoom-level").textContent = `zoom: ${currentZoom.toFixed(2)}`;
    });

  svg.call(zoomBehaviour);

  const nodeRadius = d => d.level === 1 ? 16 : d.level === 2 ? 9 : d.level === 3 ? 5.5 : d.level === 4 ? 4 : 3;

  // Pre-seed continent nodes in a circle so they start spread out
  const continentNames = Object.keys(CONTINENTS);
  const seedRadius = Math.min(w, h) * 0.32;
  const continentSeeds = {};
  continentNames.forEach((name, i) => {
    const angle = (i / continentNames.length) * 2 * Math.PI;
    continentSeeds[name] = {
      x: w / 2 + seedRadius * Math.cos(angle),
      y: h / 2 + seedRadius * Math.sin(angle)
    };
  });

  nodes.forEach(n => {
    const seed = continentSeeds[n.continent];
    if (seed) {
      const scatter = n.level === 1 ? 0 : n.level === 2 ? 60 : n.level === 3 ? 120 : n.level === 4 ? 160 : 190;
      n.x = seed.x + (Math.random() - 0.5) * scatter;
      n.y = seed.y + (Math.random() - 0.5) * scatter;
    }
  });

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).id(d => d.id).distance(d => {
      const tl = typeof d.target === "object" ? d.target.level : (nodeMap[d.target]?.level || 2);
      return tl <= 2 ? 90 : tl === 3 ? 55 : tl === 4 ? 35 : 22;
    }).strength(0.8))
    .force("charge", d3.forceManyBody().strength(d => d.level === 1 ? -1200 : d.level === 2 ? -300 : d.level === 3 ? -80 : d.level === 4 ? -25 : -10))
    .force("center", d3.forceCenter(w / 2, h / 2).strength(0.05))
    .force("collide", d3.forceCollide().radius(d => nodeRadius(d) + 4).strength(0.8))
    .force("x", d3.forceX(d => continentSeeds[d.continent] ? continentSeeds[d.continent].x : w/2).strength(d => d.level === 1 ? 0.15 : 0.04))
    .force("y", d3.forceY(d => continentSeeds[d.continent] ? continentSeeds[d.continent].y : h/2).strength(d => d.level === 1 ? 0.15 : 0.04))
    .alphaDecay(0.015);

  const link = g.append("g").selectAll("line")
    .data(edges).join("line")
    .attr("stroke", d => {
      const src = typeof d.source === "object" ? d.source : nodeMap[d.source];
      return src ? (CONTINENTS[src.continent] || "#444") : "#444";
    })
    .attr("stroke-opacity", d => {
      const src = typeof d.source === "object" ? d.source : nodeMap[d.source];
      return src?.level === 1 ? 0.5 : src?.level === 2 ? 0.35 : src?.level === 3 ? 0.2 : 0.12;
    })
    .attr("stroke-width", d => {
      const src = typeof d.source === "object" ? d.source : nodeMap[d.source];
      return src?.level === 1 ? 1.5 : src?.level === 2 ? 1 : 0.5;
    });

  const node = g.append("g").selectAll("circle")
    .data(nodes).join("circle")
    .attr("r", nodeRadius)
    .attr("fill", d => d.color)
    .attr("fill-opacity", d => d.level === 1 ? 1 : d.level === 2 ? 0.85 : 0.7)
    .attr("stroke", d => d.level <= 2 ? "rgba(255,255,255,0.25)" : "none")
    .attr("stroke-width", 0.5)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  // Labels for ALL levels — opacity controlled by zoom
  const label = g.append("g").selectAll("text")
    .data(nodes).join("text")
    .text(d => d.label)
    .attr("font-size", d => d.level === 1 ? 13 : d.level === 2 ? 11 : d.level === 3 ? 10 : d.level === 4 ? 9 : 8)
    .attr("font-weight", d => d.level <= 2 ? 600 : 400)
    .attr("fill", "#fff")
    .attr("text-anchor", "middle")
    .attr("dy", d => -(nodeRadius(d) + 3))
    .attr("opacity", d => d.level <= 2 ? 1 : 0)
    .style("pointer-events", "none")
    .style("user-select", "none");

  function updateLabels() {
    label
      .attr("opacity", d => labelOpacity(d.level, currentZoom))
      .attr("font-size", d => {
        const base = d.level === 1 ? 13 : d.level === 2 ? 11 : d.level === 3 ? 10 : d.level === 4 ? 9 : 8;
        return base / currentZoom;
      })
      .attr("dy", d => -(nodeRadius(d) + 3) / currentZoom);
  }

  const tt = document.getElementById("tooltip");
  node.on("mouseover", (e, d) => {
    tt.style.display = "block";
    tt.innerHTML = `<strong style="color:${d.color}">${d.label}</strong><br><span style="color:#888;font-size:11px">${d.continent}</span>`;
  }).on("mousemove", e => {
    tt.style.left = (e.clientX + 14) + "px";
    tt.style.top = (e.clientY - 10) + "px";
  }).on("mouseout", () => { tt.style.display = "none"; });

  let selected = null;
  function resetHighlight() {
    selected = null;
    node.attr("fill-opacity", n => n.level === 1 ? 1 : n.level === 2 ? 0.85 : 0.7);
    link.attr("stroke-opacity", l => {
      const src = typeof l.source === "object" ? l.source : nodeMap[l.source];
      return src?.level === 1 ? 0.5 : src?.level === 2 ? 0.35 : src?.level === 3 ? 0.2 : 0.12;
    });
  }

  node.on("click", (e, d) => {
    e.stopPropagation();
    if (selected === d.id) { resetHighlight(); return; }
    selected = d.id;
    const connected = new Set([d.id]);
    edges.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      if (s === d.id) connected.add(t);
      if (t === d.id) connected.add(s);
    });
    node.attr("fill-opacity", n => connected.has(n.id) ? 1 : 0.08);
    link.attr("stroke-opacity", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return (s === d.id || t === d.id) ? 0.9 : 0.03;
    });
  });
  svg.on("click", resetHighlight);

  document.getElementById("search-box").addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { resetHighlight(); return; }
    const matches = new Set();
    nodes.forEach(n => { if (n.label.toLowerCase().includes(q)) matches.add(n.id); });
    node.attr("fill-opacity", n => matches.has(n.id) ? 1 : 0.06);
    link.attr("stroke-opacity", 0.03);
  });

  sim.on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });

  const legend = document.getElementById("legend");
  Object.entries(CONTINENTS).forEach(([name, color]) => {
    legend.innerHTML += `<div class="leg-item"><div class="leg-dot" style="background:${color}"></div>${name}</div>`;
  });

  window.addEventListener("resize", () => {
    const nw = window.innerWidth, nh = window.innerHeight;
    svg.attr("width", nw).attr("height", nh);
    sim.force("center", d3.forceCenter(nw/2, nh/2)).alpha(0.1).restart();
  });
}
</script>
</body>
</html>
